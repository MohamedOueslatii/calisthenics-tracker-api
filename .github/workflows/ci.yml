name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mohamed
          POSTGRES_PASSWORD: mohamed123
          POSTGRES_DB: calisthenics
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mohamed -d calisthenics"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://mohamed:mohamed123@localhost:5432/calisthenics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -t calisthenics-api .

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/calisthenics-api:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/calisthenics-api:latest \
            ${{ secrets.DOCKER_USERNAME }}/calisthenics-api:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/calisthenics-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/calisthenics-api:${{ github.sha }}
